<!DOCTYPE html>
<html lang="fr">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0a12; color: #e0e0e0; overflow: hidden; width: 100vw; height: 100vh; }

  svg { width: 100%; height: 100%; }

  .node-group { cursor: pointer; }
  .node-group:hover .node-rect { filter: brightness(1.15); }

  .legend { position: fixed; bottom: 20px; left: 20px; background: rgba(20,20,35,0.9); border: 1px solid #333; border-radius: 12px; padding: 16px 20px; font-size: 12px; z-index: 10; }

  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .title-bar { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,18,0.95); border-bottom: 1px solid #222; padding: 14px 24px; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
